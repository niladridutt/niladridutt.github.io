<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For my dearest 💙</title>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Nunito:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* --- CSS Styles --- */
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%);
            font-family: 'Nunito', sans-serif;
            overflow: hidden;
        }

        /* Floating background hearts animation */
        .bg-heart {
            position: absolute;
            color: rgba(255, 255, 255, 0.6);
            font-size: 2rem;
            animation: float 8s linear infinite;
            z-index: -1;
            user-select: none;
        }

        @keyframes float {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            20% { opacity: 1; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }

        /* Main Card Container */
        .card {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            width: 400px;
            max-width: 90%;
            position: relative;
            z-index: 10;
        }

        h1 {
            font-family: 'Pacifico', cursive;
            color: #ff4d6d;
            font-size: 2.5rem;
            margin: 0 0 10px 0;
            line-height: 1.2;
        }

        p {
            color: #555;
            font-size: 1.2rem;
            margin: 0 0 30px 0;
        }

        .btn-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 10px;
            height: 50px; 
            position: relative;
            align-items: center; /* Centers buttons vertically as one grows */
        }

        button {
            padding: 12px 30px;
            font-size: 1.1rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease; /* Smooth growth transition */
            font-weight: bold;
            outline: none;
        }

        .btn-yes {
            background-color: #ff4d6d;
            color: white;
            box-shadow: 0 4px 15px rgba(255, 77, 109, 0.4);
            z-index: 10; /* Keep Yes button on top */
        }

        .btn-yes:hover {
            background-color: #e63950;
        }

        .btn-no {
            background-color: #eaeaea;
            color: #555;
            position: relative; 
            z-index: 50; 
        }

        /* Success Message Styles */
        .success-text {
            font-size: 1.2rem;
            color: #333;
            line-height: 1.6;
        }

        .booked-date {
            font-weight: bold;
            color: #3c49e1;
            font-size: 1.4rem;
            margin: 15px 0;
            display: block;
        }

        .hidden {
            display: none !important;
        }

        /* --- Falling Emoji Animation (For Success) --- */
        .emoji-rain {
            position: absolute;
            top: -50px;
            font-size: 2rem;
            animation: fall 3s linear forwards;
            z-index: 20;
            pointer-events: none;
        }

        @keyframes fall {
            to { transform: translateY(110vh); }
        }

        /* --- Sad Face Ghost Animation (For 'No' button) --- */
        .sad-ghost {
            position: fixed;
            font-size: 2rem;
            pointer-events: none;
            z-index: 100;
            animation: ghostFloat 1s ease-out forwards;
        }

        @keyframes ghostFloat {
            0% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-50px); }
        }
    </style>
</head>
<body>

    <div id="bg-hearts"></div>

    <div class="card">
        
        <div id="questionSection">
            <h1>Sanjukta...</h1>
            <br>
            <p>Will you be my Valentine? 🌹</p>
            
            <div class="btn-container">
                <button class="btn-yes" id="yesBtn" onclick="handleYes()">YES!</button>
                <button class="btn-no" id="noBtn" onmouseover="moveButton()" onclick="moveButton()">NO</button>
            </div>
        </div>

        <div id="successSection" class="hidden">
            <h1>Yaaayyy! 💙</h1>
            <div class="success-text">
                <br>
                OMG! I knew you'd say yes!!!
                <span class="booked-date">Date is booked with Neel: 14.02.2026 💌</span>
                See you there! 💐🍫🧸
            </div>
        </div>

    </div>

    <script>
        /* --- JavaScript Logic --- */

        let yesScale = 1; // Current size of the Yes button

        // 1. Create background hearts
        function createBgHearts() {
            const container = document.getElementById('bg-hearts');
            const hearts = ['❤️', '💖', '🌸', '🌷', '☁️'];
            
            for (let i = 0; i < 20; i++) {
                const el = document.createElement('div');
                el.classList.add('bg-heart');
                el.innerText = hearts[Math.floor(Math.random() * hearts.length)];
                el.style.left = Math.random() * 100 + 'vw';
                el.style.animationDuration = (Math.random() * 5 + 5) + 's';
                el.style.animationDelay = Math.random() * 5 + 's';
                container.appendChild(el);
            }
        }
        createBgHearts();

        // 2. The "Running Away" Logic + Spawning Sad Faces + Growing Yes Button
        const noBtn = document.getElementById('noBtn');
        const yesBtn = document.getElementById('yesBtn');
        const sadEmojis = ['😢', '💔', '🥺', '😞', '😭', '😿'];

        function moveButton() {
            // A. Get current position BEFORE moving
            const rect = noBtn.getBoundingClientRect();
            
            // B. Spawn a Sad Face at the old position
            spawnSadFace(rect.left, rect.top);

            // C. Move the No button to a new random position
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth - 50);
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight - 50);

            noBtn.style.position = 'fixed'; 
            noBtn.style.left = `${x}px`;
            noBtn.style.top = `${y}px`;

            // D. Grow the Yes button
            yesScale += 0.2; // Increase size by 20% each time
            yesBtn.style.transform = `scale(${yesScale})`;
        }

        function spawnSadFace(x, y) {
            const face = document.createElement('div');
            face.classList.add('sad-ghost');
            face.innerText = sadEmojis[Math.floor(Math.random() * sadEmojis.length)];
            
            face.style.left = `${x + 20}px`; 
            face.style.top = `${y}px`;
            
            document.body.appendChild(face);

            setTimeout(() => {
                face.remove();
            }, 1000);
        }

        // 3. The "Yes" Logic
        function handleYes() {
            const qSection = document.getElementById('questionSection');
            qSection.classList.add('hidden');

            const sSection = document.getElementById('successSection');
            sSection.classList.remove('hidden');
            
            startEmojiRain();
        }

        // 4. Emoji Rain Effect
        function startEmojiRain() {
            const emojis = ['🌹', '❤️', '😻', '🍫', '🌸', '💑', '✨'];
            
            for (let i = 0; i < 60; i++) {
                setTimeout(() => {
                    const el = document.createElement('div');
                    el.classList.add('emoji-rain');
                    el.innerText = emojis[Math.floor(Math.random() * emojis.length)];
                    el.style.left = Math.random() * 100 + 'vw';
                    el.style.animationDuration = (Math.random() * 2 + 2) + 's';
                    document.body.appendChild(el);
                    
                    setTimeout(() => el.remove(), 4000);
                }, i * 70); 
            }
        }
    </script>
</body>
</html>
